name: Golden — Rebaseline

# Weekly full re-baseline for classifier-agent. Re-fires every drift
# kind, aggregates the scores, and OVERWRITES the canonical baseline at
# gs://thet-integration-af-assessorflow-materials/golden/baselines/baseline-classifier-agent.json.
#
# All subsequent drift-* workflow runs compare against the new baseline.

on:
  schedule:
    - cron: '0 6 * * 1'   # weekly Mon 14:00 SGT (06:00 UTC) — after last drift (drift-retrieval-poisoning at Mon 13:00 SGT)
  workflow_dispatch:
    inputs:
      scenario:
        description: "Scenario"
        type: choice
        default: "sufficient"
        options: ["sufficient", "insufficient"]

permissions:
  contents: read
  id-token: write

concurrency:
  group: golden-rebaseline
  cancel-in-progress: false

env:
  GCP_PROJECT: thet-integration-af
  GCS_BUCKET: thet-integration-af-assessorflow-materials
  WIF_PROVIDER: projects/459087601514/locations/global/workloadIdentityPools/github-actions/providers/github
  GCP_SA: github-actions@thet-integration-af.iam.gserviceaccount.com
  CLUSTER: af-smoke-cluster
  CLUSTER_LOCATION: asia-southeast1-b
  # Port-forward URLs — single source of truth. Updating the forward port
  # below is a 1-line change. Source code never defaults these — must be
  # passed via env to scripts/golden_rebaseline.py and scripts/drift_runner.py.
  KS_PF_URL: http://127.0.0.1:8020
  MB_PF_URL: http://127.0.0.1:8010

jobs:
  rebaseline:
    name: Rebaseline / classifier-agent
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.CLUSTER_LOCATION }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Port-forward Model Broker + Knowledge Service
        run: |
          kubectl port-forward -n af-platform svc/model-broker 8010:8000 > /tmp/pf-mb.log 2>&1 &
          echo $! > /tmp/pf-mb.pid
          kubectl port-forward -n af-platform svc/knowledge-service 8020:8020 > /tmp/pf-ks.log 2>&1 &
          echo $! > /tmp/pf-ks.pid
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:8010/health > /dev/null 2>&1 && \
               curl -sf http://localhost:8020/health > /dev/null 2>&1; then
              echo "port-forwards ready"
              break
            fi
            sleep 2
          done

      - name: Install package
        # Same install contract as drift workflows: real DeepEval + DeepTeam
        # required (no silent fallback). golden_rebaseline.py shells out to
        # drift_runner.py 9 times, each of which calls real LLM judges.
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,eval]" deepeval deepteam
          echo "PYTHONPATH=${{ github.workspace }}/vendor:${PYTHONPATH:-}" >> "$GITHUB_ENV"

      - name: Re-baseline (real af-platform Model Broker + KS)
        # Port-forward URLs are derived from the established forwards above.
        # Single source of truth: workflow env block. Same localhost shape as
        # drift but consumed via env vars — script has no defaults.
        env:
          SCENARIO: ${{ inputs.scenario || 'sufficient' }}
          GCS_BUCKET: ${{ env.GCS_BUCKET }}
          KNOWLEDGE_SERVICE_ADAPTER: http
          MODEL_BROKER_ADAPTER: http
          KS_URL: ${{ env.KS_PF_URL }}
          MODEL_BROKER_URL: ${{ env.MB_PF_URL }}
        run: |
          python scripts/golden_rebaseline.py

      - name: Tear down port-forwards
        if: always()
        run: |
          [ -f /tmp/pf-mb.pid ] && kill "$(cat /tmp/pf-mb.pid)" 2>/dev/null || true
          [ -f /tmp/pf-ks.pid ] && kill "$(cat /tmp/pf-ks.pid)" 2>/dev/null || true

      - name: Upload new baseline artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-classifier-agent-${{ github.run_id }}
          path: ${{ runner.temp }}/golden-rebaseline/new-baseline.json
          retention-days: 365
