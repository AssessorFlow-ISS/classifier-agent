name: CI — Classifier Agent

# Pre-merge CI matching the docx LLMSecOps pipeline matrix:
#
#   Area          Tools                                    Purpose
#   ─────────────────────────────────────────────────────────────────
#   Automated     pytest, pytest-asyncio, pytest-cov       unit/integration + coverage
#   Code quality  Ruff, mypy                               format/lint/imports + typing
#   Security      pip-audit, Bandit (CodeAudit),           deps, code, secrets, GHA
#                 TruffleHog, zizmor                       workflow security
#   LLM checks    DeepEval, Promptfoo                      output quality + red-team
#   Container     Docker, Buildx, Trivy                    build + HIGH/CRITICAL scan
#
# DAG mirrors the screenshot-1 sandbox layout: 4 parallel pre-gates feed
# unit-tests; unit-tests gates integration + container build + LLM checks
# in parallel.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # WIF for the LLM jobs (real Model Broker + KS)

env:
  PYTHON_VERSION: "3.12"
  # Real-infra wiring (matches _drift-base.yml)
  GCP_PROJECT: thet-integration-af
  GCS_BUCKET: thet-integration-af-assessorflow-materials
  WIF_PROVIDER: projects/459087601514/locations/global/workloadIdentityPools/github-actions/providers/github
  GCP_SA: github-actions@thet-integration-af.iam.gserviceaccount.com
  CLUSTER: af-smoke-cluster
  CLUSTER_LOCATION: asia-southeast1-b
  # Deploy / hand-off targets (used only on main pushes)
  AR_REGISTRY: asia-southeast1-docker.pkg.dev
  AR_REPO: assessorflow
  IMAGE_NAME: classifier-agent
  CLOUD_DEPLOY_PIPELINE: classifier-agent
  CLOUD_DEPLOY_REGION: asia-southeast1

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Stage 1: 4 parallel pre-gates
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: Code quality — Ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff mypy
      - name: Ruff check
        run: ruff check src/ tests/ scripts/
      - name: Ruff format check (advisory)
        run: ruff format --check src/ tests/ scripts/ || echo "::warning::ruff format would reformat files; not gating"
      - name: mypy (best-effort)
        run: mypy src/classification_agent/ || echo "::warning::mypy issues; not gating"

  sast:
    name: Security — Bandit (CodeAudit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install 'bandit[toml]'
      - run: bandit -r src/ -f json -o bandit-report.json --severity-level medium
        continue-on-error: true
      - run: bandit -r src/ --severity-level medium
        continue-on-error: true
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  sca:
    name: Security — pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install pip-audit
      - run: pip-audit --format=json -o pip-audit-results.json
        continue-on-error: true
      - run: pip-audit
        continue-on-error: true
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit-results.json

  secret-scan:
    name: Security — TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown
        continue-on-error: true

  workflow-security:
    name: Security — zizmor (GHA audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install zizmor
      - run: zizmor .github/workflows/
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────
  # Stage 2: Unit tests + coverage gate (>=90% per pyproject.toml)
  # ──────────────────────────────────────────────────────────────────
  unit-tests:
    name: Automated — pytest + coverage
    runs-on: ubuntu-latest
    needs: [lint, sast, sca, secret-scan, workflow-security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          echo "PYTHONPATH=${{ github.workspace }}/vendor:${PYTHONPATH:-}" >> "$GITHUB_ENV"
      - name: pytest with coverage gate (>=90%)
        # Vendor shim (vendor/af_shared/) now provides adapters.factory +
        # pubsub.agent_subscriber + adapters.stubs.tracing_stub, so the 5
        # tests that previously had to be --ignore'd can now run in CI:
        #   - tests/test_pubsub_adapter.py
        #   - tests/test_api.py
        #   - tests/test_main_adapter_wiring.py
        #   - tests/test_main_handler.py
        #   - tests/test_tracing_wiring.py
        #
        # tests/adversarial and tests/eval are still --ignore'd here only
        # because they have their own dedicated CI cards (llm-deepteam,
        # llm-promptfoo, llm-quality-deepeval) which exercise them
        # against the real af-platform Model Broker. Running them inside
        # the unit-tests job would double-bill broker calls.
        #
        # Coverage gate restored to 90% — was =0 only while shim was
        # incomplete. Per pyproject.toml addopts.
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/adversarial \
            --ignore=tests/eval \
            --cov=src/classification_agent \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=90
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ──────────────────────────────────────────────────────────────────
  # Stage 3: Integration + LLM + container (parallel after unit gate)
  # ──────────────────────────────────────────────────────────────────
  integration-tests:
    name: Automated — integration tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          echo "PYTHONPATH=${{ github.workspace }}/vendor:${PYTHONPATH:-}" >> "$GITHUB_ENV"
      - run: pytest tests/test_integration_cr_cls_001.py -v --tb=short --cov-fail-under=0

  llm-quality-deepeval:
    name: LLM — DeepEval quality
    runs-on: ubuntu-latest
    needs: [unit-tests]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.CLUSTER_LOCATION }}

      - run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Port-forward Model Broker + Knowledge Service
        run: |
          kubectl port-forward -n af-platform svc/model-broker 8010:8000 > /tmp/pf-mb.log 2>&1 &
          echo $! > /tmp/pf-mb.pid
          kubectl port-forward -n af-platform svc/knowledge-service 8020:8020 > /tmp/pf-ks.log 2>&1 &
          echo $! > /tmp/pf-ks.pid
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:8010/health > /dev/null 2>&1 && \
               curl -sf http://localhost:8020/health > /dev/null 2>&1; then
              echo "port-forwards ready"; break
            fi
            sleep 2
          done

      - name: Install package + DeepEval
        # NO `||` fallback. If `.[dev,eval]` extra is missing, that's a
        # packaging bug we want to surface, not paper over with a degraded
        # install. Earlier rev silently degraded to `.[dev] deepeval`.
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,eval]"
          echo "PYTHONPATH=${{ github.workspace }}/vendor:${PYTHONPATH:-}" >> "$GITHUB_ENV"

      - name: DeepEval — 4 quality metrics against REAL Model Broker
        env:
          KNOWLEDGE_SERVICE_ADAPTER: http
          MODEL_BROKER_ADAPTER: http
          KS_URL: http://localhost:8020
          MODEL_BROKER_URL: http://localhost:8010
          GCS_BUCKET: ${{ env.GCS_BUCKET }}
        run: |
          mkdir -p ci-llm-artifacts
          for kind in faithfulness answer-relevancy contextual-precision contextual-recall; do
            python scripts/drift_runner.py --drift-kind "$kind" --artifact-dir "ci-llm-artifacts/$kind"
          done

      - name: Tear down port-forwards
        if: always()
        run: |
          [ -f /tmp/pf-mb.pid ] && kill "$(cat /tmp/pf-mb.pid)" 2>/dev/null || true
          [ -f /tmp/pf-ks.pid ] && kill "$(cat /tmp/pf-ks.pid)" 2>/dev/null || true

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepeval-report
          path: ci-llm-artifacts/

  # ──────────────────────────────────────────────────────────────────
  # llm-deepteam and llm-promptfoo run in parallel after unit-tests.
  # Earlier rev bundled both into one llm-adversarial job, which meant
  # a DeepTeam crash skipped Promptfoo entirely and we got no signal on
  # the LLM-rubric path. Splitting them gives us independent green/red
  # signals for each red-team tool.
  # ──────────────────────────────────────────────────────────────────

  llm-deepteam:
    name: LLM — DeepTeam (red-team adversarial)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.CLUSTER_LOCATION }}

      - run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Port-forward Model Broker
        run: |
          kubectl port-forward -n af-platform svc/model-broker 8010:8000 > /tmp/pf-mb.log 2>&1 &
          echo $! > /tmp/pf-mb.pid
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:8010/health > /dev/null 2>&1; then
              echo "port-forward ready"; break
            fi
            sleep 2
          done

      - name: Install package + DeepTeam
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" deepteam
          echo "PYTHONPATH=${{ github.workspace }}/vendor:${PYTHONPATH:-}" >> "$GITHUB_ENV"

      - name: DeepTeam — vulnerability categories against REAL Model Broker
        # NO `|| true` — script must succeed. NO placeholder-emitting fallback —
        # script absence is a repo-state bug, not a pass.
        # DEEPTEAM_VULNS=smoke (1 vuln, ~1-2 min) is the CI default; set =full
        # to run all 8 vulnerabilities (~10 min) when you need the wide test.
        env:
          MODEL_BROKER_URL: http://localhost:8010
          DEEPTEAM_VULNS: smoke
        run: |
          mkdir -p ci-deepteam-artifacts
          python scripts/deepteam_smoke.py \
            --output ci-deepteam-artifacts/results.json

      - name: Tear down port-forward
        if: always()
        run: |
          [ -f /tmp/pf-mb.pid ] && kill "$(cat /tmp/pf-mb.pid)" 2>/dev/null || true

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepteam-report
          path: ci-deepteam-artifacts/

  llm-promptfoo:
    name: LLM — Promptfoo (3 OWASP non-overlapping)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.CLUSTER_LOCATION }}

      - run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Port-forward Model Broker
        run: |
          kubectl port-forward -n af-platform svc/model-broker 8010:8000 > /tmp/pf-mb.log 2>&1 &
          echo $! > /tmp/pf-mb.pid
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:8010/health > /dev/null 2>&1; then
              echo "port-forward ready"; break
            fi
            sleep 2
          done

      - name: Install promptfoo
        run: npm install -g promptfoo

      - name: Promptfoo — 3 OWASP categories (LLM05/LLM08/LLM10, non-overlapping)
        # promptfoo.yaml uses ${MODEL_BROKER_URL} placeholders; promptfoo's URL
        # parser does NOT expand process env in http provider URL fields, so
        # we envsubst the YAML before invoking the eval.
        # NO `|| true` — promptfoo non-zero exit must fail the job. The
        # envsubst-guard exits 1 if any ${VAR} is left unexpanded, so a
        # silent URL-parse pass-by-default cannot recur.
        env:
          MODEL_BROKER_URL: http://localhost:8010
        run: |
          mkdir -p ci-promptfoo-artifacts
          envsubst < promptfoo.yaml > promptfoo.expanded.yaml
          if grep -q '\${MODEL_BROKER_URL}' promptfoo.expanded.yaml; then
            echo "::error::envsubst did not expand MODEL_BROKER_URL in promptfoo.yaml"
            exit 1
          fi
          promptfoo eval --config promptfoo.expanded.yaml \
            --output ci-promptfoo-artifacts/results.json \
            --no-progress-bar

      - name: Tear down port-forward
        if: always()
        run: |
          [ -f /tmp/pf-mb.pid ] && kill "$(cat /tmp/pf-mb.pid)" 2>/dev/null || true

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptfoo-report
          path: ci-promptfoo-artifacts/

  dast:
    name: Security — DAST (ZAP baseline)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          echo "PYTHONPATH=${{ github.workspace }}/vendor:${PYTHONPATH:-}" >> "$GITHUB_ENV"

      - name: Start HTTP surface on :8000 for ZAP baseline
        # scripts/dast_target_app.py mirrors the classifier's route shapes
        # (/, /health, /ready, /classify) so ZAP can scan HTTP-layer
        # security (headers, methods, error disclosure). The real app
        # imports af_shared.adapters.factory which is not in the vendored
        # shim — that gap is tracked debt (PAT install of
        # assessorflow/shared). ZAP does NOT score classification logic
        # or LLM behavior; those are exercised by DeepEval/DeepTeam/
        # Promptfoo against the real af-platform Model Broker.
        run: |
          nohup uvicorn scripts.dast_target_app:app --host 0.0.0.0 --port 8000 > /tmp/app.log 2>&1 &
          echo $! > /tmp/app.pid
          for i in $(seq 1 20); do
            if curl -sS -o /dev/null -w '%{http_code}' http://localhost:8000/ 2>/dev/null | grep -qE '200|404|405'; then
              echo "app responding after ${i}s"
              break
            fi
            sleep 1
          done
          echo "--- app log tail ---"
          tail -50 /tmp/app.log || true
          curl -sS http://localhost:8000/health -o /dev/null -w 'health probe: %{http_code}\n' || echo "health probe failed"

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.13.0
        # zap action v0.13.0 has an internal upload-artifact step that
        # collides with GH's newer artifact API (Create Artifact Container
        # failed: artifact name 'zap_scan' is not valid). The scan itself
        # produces clean PASS/WARN reports — we capture them via our own
        # actions/upload-artifact@v4 step below. continue-on-error keeps
        # the job green when only the internal upload step fails.
        continue-on-error: true
        with:
          target: 'http://localhost:8000'
          cmd_options: '-a -j -m 5 -T 5'
          allow_issue_writing: false
          fail_action: false

      - name: Stop app
        if: always()
        run: |
          [ -f /tmp/app.pid ] && kill "$(cat /tmp/app.pid)" 2>/dev/null || true

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: |
            report_html.html
            report_json.json
            report_md.md

  build-container:
    name: Container — Docker build + Trivy scan
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build container (commit-SHA tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: classifier-agent:${{ github.sha }}
          load: true
      - name: Trivy HIGH/CRITICAL scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: classifier-agent:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'   # report only; do not fail build on findings
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────
  # Stage 4: Summary card (always runs)
  # ──────────────────────────────────────────────────────────────────
  summary:
    name: CI summary
    needs:
      - lint
      - sast
      - sca
      - secret-scan
      - workflow-security
      - unit-tests
      - integration-tests
      - llm-quality-deepeval
      - llm-deepteam
      - llm-promptfoo
      - dast
      - build-container
    if: always()
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Render summary
        run: |
          {
            echo "## CI — Classifier Agent"
            echo ""
            echo "Pre-merge gate matrix per LLMSecOps doc:"
            echo ""
            echo "| Card | Tool | Result |"
            echo "|---|---|---|"
            echo "| Code quality | Ruff + mypy | ${{ needs.lint.result }} |"
            echo "| Security — code | Bandit | ${{ needs.sast.result }} |"
            echo "| Security — deps | pip-audit | ${{ needs.sca.result }} |"
            echo "| Security — secrets | TruffleHog | ${{ needs.secret-scan.result }} |"
            echo "| Security — workflows | zizmor | ${{ needs.workflow-security.result }} |"
            echo "| Automated — unit | pytest + cov>=90% | ${{ needs.unit-tests.result }} |"
            echo "| Automated — integration | pytest | ${{ needs.integration-tests.result }} |"
            echo "| LLM — quality | DeepEval | ${{ needs.llm-quality-deepeval.result }} |"
            echo "| LLM — adversarial (red-team) | DeepTeam | ${{ needs.llm-deepteam.result }} |"
            echo "| LLM — adversarial (OWASP) | Promptfoo | ${{ needs.llm-promptfoo.result }} |"
            echo "| Security — DAST | ZAP baseline | ${{ needs.dast.result }} |"
            echo "| Container | Docker + Trivy | ${{ needs.build-container.result }} |"
            echo ""
            echo "Commit: \`${{ github.sha }}\`"
            echo "Triggered: ${{ github.event_name }} on \`${{ github.ref_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────────
  # Stage 5: main-only — build, push to GAR, hand off to Cloud Deploy
  # Skipped on feat/** and PR runs (still appear in the graph as skipped)
  # ──────────────────────────────────────────────────────────────────
  build-push-to-gar:
    name: "Build + push to Artifact Registry"
    needs:
      - unit-tests
      - integration-tests
      - llm-quality-deepeval
      - llm-deepteam
      - llm-promptfoo
      - dast
      - build-container
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA }}
          token_format: access_token
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ env.AR_REGISTRY }} --quiet

      - id: image
        name: Compute image URI
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          uri="${{ env.AR_REGISTRY }}/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}"
          echo "uri=${uri}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
      - name: "Build + push (multi-tag SHA / short SHA / main)"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}:${{ github.sha }}
            ${{ steps.image.outputs.uri }}:${{ steps.image.outputs.short_sha }}
            ${{ steps.image.outputs.uri }}:main
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  handoff-to-cloud-deploy:
    name: "Hand-off to Cloud Deploy"
    needs: [build-push-to-gar]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA }}
      - uses: google-github-actions/setup-gcloud@v2

      - id: release
        name: Compute release name
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          name="rel-${short_sha}-$(date -u +%Y%m%d%H%M)"
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Notify Cloud Deploy (advisory — soft-fail if pipeline absent)
        run: |
          if gcloud deploy delivery-pipelines describe ${{ env.CLOUD_DEPLOY_PIPELINE }} \
                --project=${{ env.GCP_PROJECT }} \
                --region=${{ env.CLOUD_DEPLOY_REGION }} > /dev/null 2>&1; then
            gcloud deploy releases create ${{ steps.release.outputs.name }} \
              --project=${{ env.GCP_PROJECT }} \
              --region=${{ env.CLOUD_DEPLOY_REGION }} \
              --delivery-pipeline=${{ env.CLOUD_DEPLOY_PIPELINE }} \
              --images=classifier-agent=${{ needs.build-push-to-gar.outputs.image_uri }}:${{ github.sha }} \
              --annotations="git_sha=${{ github.sha }},triggered_by=${{ github.actor }},workflow_run=${{ github.run_id }}"
            echo "PIPELINE_STATUS=created" >> "$GITHUB_ENV"
          else
            echo "::notice::Cloud Deploy pipeline '${{ env.CLOUD_DEPLOY_PIPELINE }}' not provisioned in ${{ env.CLOUD_DEPLOY_REGION }}; image is in GAR ready for the pipeline once it lands"
            echo "PIPELINE_STATUS=skipped" >> "$GITHUB_ENV"
          fi

      - name: Render hand-off summary
        run: |
          {
            echo "## Hand-off to Cloud Deploy"
            echo ""
            echo "GitHub Actions has finished. Cloud Deploy now owns the rollout."
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Image (in GAR) | \`${{ needs.build-push-to-gar.outputs.image_uri }}:${{ github.sha }}\` |"
            echo "| Release name | \`${{ steps.release.outputs.name }}\` |"
            echo "| Cloud Deploy pipeline | \`${{ env.CLOUD_DEPLOY_PIPELINE }}\` (region: \`${{ env.CLOUD_DEPLOY_REGION }}\`) |"
            echo "| Pipeline call | \`${PIPELINE_STATUS}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
