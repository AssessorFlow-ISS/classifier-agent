name: Drift — Score Consistency

# Re-grade variance check on classifier-agent sufficiency/rubric scores.

on:
  schedule:
    - cron: '45 10 * * *'  # daily 18:45 SGT (10:45 UTC) — 3-min stagger slot 6/9
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: drift-score-consistency
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_drift-base.yml
    with:
      drift_kind: score-consistency
    secrets: inherit
