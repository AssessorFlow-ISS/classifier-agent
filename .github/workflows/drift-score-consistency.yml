name: Drift — Score Consistency

# Re-grade variance check on classifier-agent sufficiency/rubric scores.

on:
  schedule:
    - cron: '15 8 * * 1'   # weekly Mon 16:15 SGT (Mon 08:15 UTC) — 5-min stagger slot 6/9
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: drift-score-consistency
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_drift-base.yml
    with:
      drift_kind: score-consistency
    secrets: inherit
