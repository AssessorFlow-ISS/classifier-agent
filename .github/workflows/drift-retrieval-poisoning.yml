name: Drift — Retrieval Poisoning

# Replay 8 poisoned chunks from af-golden namespace; assert L-10 guardrail
# catches them and the classifier-agent does not propagate the poison into
# downstream events.

on:
  schedule:
    - cron: '54 9 * * 1'   # weekly Mon 17:54 SGT (Mon 09:54 UTC) — 3-min stagger slot 9/9
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: drift-retrieval-poisoning
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_drift-base.yml
    with:
      drift_kind: retrieval-poisoning
    secrets: inherit
