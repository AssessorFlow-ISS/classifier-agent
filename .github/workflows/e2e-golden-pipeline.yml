name: E2E — Golden Pipeline (real validator-write + KS + classifier + …)

# True end-to-end test that drives the full 13-stage assessment workflow
# through every agent in the af-golden namespace (isolated test stack).
#
# DESIGN: Option 3 — runs as a Kubernetes Job INSIDE the cluster.
# - No port-forwards (was blocked by missing cloudsql-proxy svc + auth)
# - Cluster-internal trust: Job calls api-server-golden, KS-golden,
#   model-broker-golden, etc. via .svc.cluster.local
# - Auth: GOLDEN_ASSESSOR_EMAIL must be a real af_identity.users row
#   (`is_active=true`); submission-service-golden middleware looks it up
# - Blast radius isolated to af-golden (separate broker, agents, KS,
#   submission-service, Redis, DB schema). Only af_identity.users is
#   shared (read-only lookup) — and we use a real assessor row, not a
#   synthetic one, so no DB mutation needed.
#
# COST: af-golden must be SCALED UP before this runs (12 deployments,
# ~$1-3/hr while up). The workflow scales up at start, runs the Job,
# scales back down. Total: ~10-15 min including scale-up wait.
#
# Each run scores per-agent traces with DeepEval. Baselines uploaded to
# GCS at gs://thet-integration-af-assessorflow-materials/golden/e2e-baselines/<run-id>/

on:
  schedule:
    # weekly Mon 14:50 SGT (06:50 UTC) — earliest slot in the
    # weekly drift block (drifts 15:50–16:30 SGT follow this 6 min apart)
    - cron: '50 6 * * 1'
  workflow_dispatch:
    inputs:
      scenario:
        description: "Scenario"
        type: choice
        default: "insufficient"
        options: ["insufficient", "sufficient"]
      assessor_email:
        description: "Real af_identity.users email (must exist + is_active)"
        type: string
        default: "daleleung76@gmail.com"

permissions:
  contents: read
  id-token: write

concurrency:
  group: e2e-golden-pipeline
  cancel-in-progress: false

env:
  GCP_PROJECT: thet-integration-af
  WIF_PROVIDER: projects/459087601514/locations/global/workloadIdentityPools/github-actions/providers/github
  GCP_SA: github-actions@thet-integration-af.iam.gserviceaccount.com
  CLUSTER: af-smoke-cluster
  CLUSTER_LOCATION: asia-southeast1-b
  GOLDEN_NS: af-golden
  GOLDEN_DEPLOYMENTS: |
    api-server-golden classification-agent-golden evaluator-agent-golden
    knowledge-service-golden model-broker-golden orchestrator-agent-golden
    qna-generation-agent-golden redis-golden reporting-agent-golden
    submission-service-golden validator-agent-golden web-research-agent-golden

jobs:
  e2e:
    name: E2E / classifier-agent (af-golden, in-cluster Job)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.CLUSTER_LOCATION }}

      - run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Scale af-golden UP
        run: |
          for d in $GOLDEN_DEPLOYMENTS; do
            kubectl scale deploy "$d" -n "$GOLDEN_NS" --replicas=1
          done
          kubectl wait --for=condition=available deployment --all -n "$GOLDEN_NS" --timeout=300s

      - name: Create configMap (golden_workflow_eval.py)
        env:
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          kubectl create configmap "golden-e2e-script-${GH_RUN_ID}" \
            -n "$GOLDEN_NS" \
            --from-file=golden_workflow_eval.py \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Job manifest
        env:
          GH_RUN_ID: ${{ github.run_id }}
          GOLDEN_SCENARIO: ${{ inputs.scenario || 'insufficient' }}
          ASSESSOR_EMAIL: ${{ inputs.assessor_email || 'daleleung76@gmail.com' }}
          JUDGE_MODEL: gemini-2.0-flash
        run: |
          envsubst < .github/workflows/e2e-golden-job.yaml | kubectl apply -f -

      - name: Wait for Job + stream logs
        env:
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          set -e
          # Wait up to 25 min for the Job to complete (success or fail)
          kubectl wait --for=condition=complete \
            "job/golden-e2e-${GH_RUN_ID}" -n "$GOLDEN_NS" \
            --timeout=1500s &
          WAIT_PID=$!

          # Stream pod logs in parallel; if Job fails we still see why
          POD=$(kubectl get pods -n "$GOLDEN_NS" \
            -l "run_id=${GH_RUN_ID}" \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          while [ -z "$POD" ]; do
            sleep 5
            POD=$(kubectl get pods -n "$GOLDEN_NS" \
              -l "run_id=${GH_RUN_ID}" \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          done
          echo "Streaming logs from pod: $POD"
          kubectl logs -n "$GOLDEN_NS" -f "$POD" || true

          wait "$WAIT_PID" || {
            echo "::error::Job did not complete successfully"
            kubectl describe "job/golden-e2e-${GH_RUN_ID}" -n "$GOLDEN_NS" || true
            exit 1
          }

      - name: Scale af-golden DOWN
        if: always()
        run: |
          for d in $GOLDEN_DEPLOYMENTS; do
            kubectl scale deploy "$d" -n "$GOLDEN_NS" --replicas=0 || true
          done

      - name: Cleanup Job + configMap
        if: always()
        env:
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          kubectl delete "job/golden-e2e-${GH_RUN_ID}" -n "$GOLDEN_NS" --ignore-not-found
          kubectl delete "cm/golden-e2e-script-${GH_RUN_ID}" -n "$GOLDEN_NS" --ignore-not-found

      - name: Render summary
        if: always()
        env:
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          {
            echo "## E2E — Golden Pipeline / classifier-agent (in-cluster Job)"
            echo ""
            echo "Full 13-stage assessment workflow exercised in af-golden:"
            echo "real assessment creation → validator-write to KS → classifier"
            echo "reads chunks via KS gRPC → Q&A Gen → Evaluator → Reporting."
            echo ""
            echo "**Scenario:** \`${{ inputs.scenario || 'insufficient' }}\`  "
            echo "**Mode:** in-cluster Job (af-golden namespace, isolated stack)  "
            echo "**Assessor identity:** \`${{ inputs.assessor_email || 'daleleung76@gmail.com' }}\`  "
            echo "**Validator-write path:** EXERCISED (real chunks written to KS-golden)  "
            echo "**RAG/canary/poisoning testable:** YES  "
            echo ""
            echo "Per-agent baselines uploaded to:"
            echo "\`gs://thet-integration-af-assessorflow-materials/golden/e2e-baselines/${GH_RUN_ID}/\`"
            echo ""
            echo "af-golden scaled back down post-run."
          } >> "$GITHUB_STEP_SUMMARY"
