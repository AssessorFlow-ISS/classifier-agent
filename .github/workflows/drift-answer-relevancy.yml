name: Drift — Answer Relevancy

# DeepEval AnswerRelevancy drift on classifier-agent topic synthesis quality.

on:
  schedule:
    - cron: '0 22 * * 0'   # weekly Mon 06:00 SGT (Sun 22:00 UTC)
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: drift-answer-relevancy
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_drift-base.yml
    with:
      drift_kind: answer-relevancy
    secrets: inherit
