name: Drift — Answer Relevancy

# DeepEval AnswerRelevancy drift on classifier-agent topic synthesis quality.

on:
  schedule:
    - cron: '55 7 * * 1'   # weekly Mon 15:55 SGT (Mon 07:55 UTC) — 5-min stagger slot 2/9
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: drift-answer-relevancy
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_drift-base.yml
    with:
      drift_kind: answer-relevancy
    secrets: inherit
