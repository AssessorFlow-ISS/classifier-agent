name: _Drift base (reusable)

# Reusable workflow used by every per-kind drift runner. Each caller sets
# `drift_kind` and inherits the WIF auth + GCS pull + script run + artifact
# upload + summary write. Centralising here keeps the 9 caller YAMLs ~30 lines
# each so future tuning happens in one place.

on:
  workflow_call:
    inputs:
      drift_kind:
        description: "Drift kind slug (matches scripts/drift_runner.py --drift-kind)"
        required: true
        type: string
      timeout_minutes:
        description: "Per-job timeout"
        required: false
        type: number
        default: 15

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT: thet-integration-af
  GCS_BUCKET: thet-integration-af-assessorflow-materials
  WIF_PROVIDER: projects/459087601514/locations/global/workloadIdentityPools/github-actions/providers/github
  GCP_SA: github-actions@thet-integration-af.iam.gserviceaccount.com
  CLUSTER: af-smoke-cluster
  CLUSTER_LOCATION: asia-southeast1-b
  # Port-forward URL — single source of truth for the loopback target the
  # script consumes via MODEL_BROKER_URL. Source code never defaults this
  # (drift_runner.py raises on missing). Updating the port below is the
  # only place this URL appears in workflow definitions.
  MB_PF_URL: http://127.0.0.1:8010

jobs:
  drift-check:
    name: Drift / classifier-agent
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.CLUSTER_LOCATION }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Port-forward Model Broker (KS uses stub for drift)
        # Drift testing exercises the LLM-judge surface. The classifier is
        # invoked with `request.chunks` override which short-circuits the
        # KS-fetch path, but search_policies + store_topics still call KS.
        # We use the stub KS for those (no cluster roundtrip; KS would
        # return 500 for synthetic workflow_ids that aren't in af_orchestrator).
        # Model Broker IS the real cluster service — that's the point of the
        # drift run: real LLM judge + real classifier LLM calls.
        run: |
          kubectl port-forward -n af-platform svc/model-broker 8010:8000 > /tmp/pf-mb.log 2>&1 &
          echo $! > /tmp/pf-mb.pid
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:8010/health > /dev/null 2>&1; then
              echo "port-forward ready"
              break
            fi
            sleep 2
          done

      - name: Install package
        run: |
          pip install --upgrade pip
          # drift_runner.py requires real LLM-judge calls via DeepEval +
          # DeepTeam (bias). No fallback: missing deps -> hard fail.
          pip install -e ".[dev,eval]" deepeval deepteam
          # Add vendored af_shared shim to import path (until proper PAT-based
          # install of assessorflow/shared is wired up — see vendor/af_shared/)
          echo "PYTHONPATH=${{ github.workspace }}/vendor:${PYTHONPATH:-}" >> "$GITHUB_ENV"

      - name: Run drift runner (real Model Broker, stub KS)
        # MODEL_BROKER_URL sourced from the workflow env block. Note that the
        # classifier itself uses the StubKnowledgeServiceAdapter for drift —
        # synthetic workflow_ids would 500 against the real KS. RAG-poisoning
        # of the live KS path is covered by e2e-golden-pipeline, not here.
        env:
          GCS_BUCKET: ${{ env.GCS_BUCKET }}
          KNOWLEDGE_SERVICE_ADAPTER: stub
          MODEL_BROKER_ADAPTER: http
          MODEL_BROKER_URL: ${{ env.MB_PF_URL }}
        run: |
          python scripts/drift_runner.py \
            --drift-kind ${{ inputs.drift_kind }} \
            --artifact-dir ./drift-artifacts

      - name: Tear down port-forward
        if: always()
        run: |
          [ -f /tmp/pf-mb.pid ] && kill "$(cat /tmp/pf-mb.pid)" 2>/dev/null || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-${{ inputs.drift_kind }}-classifier-agent-${{ github.run_id }}
          path: drift-artifacts/
          retention-days: 30
