name: _Drift base (reusable)

# Reusable workflow used by every per-kind drift runner. Each caller sets
# `drift_kind` and inherits the WIF auth + GCS pull + script run + artifact
# upload + summary write. Centralising here keeps the 9 caller YAMLs ~30 lines
# each so future tuning happens in one place.

on:
  workflow_call:
    inputs:
      drift_kind:
        description: "Drift kind slug (matches scripts/drift_runner.py --drift-kind)"
        required: true
        type: string
      timeout_minutes:
        description: "Per-job timeout"
        required: false
        type: number
        default: 15

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT: thet-integration-af
  GCS_BUCKET: thet-integration-af-assessorflow-materials
  WIF_PROVIDER: projects/459087601514/locations/global/workloadIdentityPools/github-actions/providers/github
  GCP_SA: github-actions@thet-integration-af.iam.gserviceaccount.com
  CLUSTER: af-smoke-cluster
  CLUSTER_LOCATION: asia-southeast1-b

jobs:
  drift-check:
    name: Drift / classifier-agent
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.CLUSTER_LOCATION }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Port-forward Model Broker + Knowledge Service
        run: |
          kubectl port-forward -n af-platform svc/model-broker 8010:8000 > /tmp/pf-mb.log 2>&1 &
          echo $! > /tmp/pf-mb.pid
          kubectl port-forward -n af-platform svc/knowledge-service 8020:8020 > /tmp/pf-ks.log 2>&1 &
          echo $! > /tmp/pf-ks.pid
          # Wait for port-forwards to establish
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:8010/health > /dev/null 2>&1 && \
               curl -sf http://localhost:8020/health > /dev/null 2>&1; then
              echo "port-forwards ready"
              break
            fi
            sleep 2
          done

      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          # Add vendored af_shared shim to import path (until proper PAT-based
          # install of assessorflow/shared is wired up — see vendor/af_shared/)
          echo "PYTHONPATH=${{ github.workspace }}/vendor:${PYTHONPATH:-}" >> "$GITHUB_ENV"

      - name: Run drift runner (real af-platform Model Broker + KS)
        env:
          GCS_BUCKET: ${{ env.GCS_BUCKET }}
          KNOWLEDGE_SERVICE_ADAPTER: http
          MODEL_BROKER_ADAPTER: http
          KS_URL: http://localhost:8020
          MODEL_BROKER_URL: http://localhost:8010
        run: |
          python scripts/drift_runner.py \
            --drift-kind ${{ inputs.drift_kind }} \
            --artifact-dir ./drift-artifacts

      - name: Tear down port-forwards
        if: always()
        run: |
          [ -f /tmp/pf-mb.pid ] && kill "$(cat /tmp/pf-mb.pid)" 2>/dev/null || true
          [ -f /tmp/pf-ks.pid ] && kill "$(cat /tmp/pf-ks.pid)" 2>/dev/null || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-${{ inputs.drift_kind }}-classifier-agent-${{ github.run_id }}
          path: drift-artifacts/
          retention-days: 30
