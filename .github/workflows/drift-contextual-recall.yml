name: Drift — Contextual Recall

# DeepEval ContextualRecall on classifier-agent chunk retrieval coverage.

on:
  schedule:
    - cron: '10 8 * * 1'   # weekly Mon 16:10 SGT (Mon 08:10 UTC) — 5-min stagger slot 5/9
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: drift-contextual-recall
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_drift-base.yml
    with:
      drift_kind: contextual-recall
    secrets: inherit
