name: Drift — Contextual Recall

# DeepEval ContextualRecall on classifier-agent chunk retrieval coverage.

on:
  schedule:
    - cron: '42 9 * * 1'   # weekly Mon 17:42 SGT (Mon 09:42 UTC) — 3-min stagger slot 5/9
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: drift-contextual-recall
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_drift-base.yml
    with:
      drift_kind: contextual-recall
    secrets: inherit
