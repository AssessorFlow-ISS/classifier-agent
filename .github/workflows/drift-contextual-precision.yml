name: Drift — Contextual Precision

# DeepEval ContextualPrecision on classifier-agent SimilaritySearch retrieval.

on:
  schedule:
    - cron: '0 0 * * 1'   # weekly Mon 08:00 SGT (Mon 00:00 UTC)
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: drift-contextual-precision
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_drift-base.yml
    with:
      drift_kind: contextual-precision
    secrets: inherit
