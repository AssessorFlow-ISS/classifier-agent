name: Drift — LLM Base

# Re-fire 19 baseline goldens at current LLM weights via Model Broker, compute
# aggregate quality. Longer timeout — touches LLM, not pure trace scoring.

on:
  schedule:
    - cron: '51 9 * * 1'   # weekly Mon 17:51 SGT (Mon 09:51 UTC) — 3-min stagger slot 8/9
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: drift-llm-base
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_drift-base.yml
    with:
      drift_kind: llm-base
      timeout_minutes: 30
    secrets: inherit
