name: Drift — Faithfulness

# DeepEval Faithfulness drift on classifier-agent. Single-row matrix
# (classifier only) — all delegation to scripts/drift_runner.py via
# the shared reusable workflow.

on:
  schedule:
    - cron: '0 0 1 */3 *'   # quarterly, 00:00 UTC (canonical)
    # TEMPORARY (REMOVE AFTER CAPTURE): tightened to every-minute syntax to
    # maximize scheduler hit rate. GH floors anything <5min to 5min in practice.
    - cron: '* * * * *'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: drift-faithfulness
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_drift-base.yml
    with:
      drift_kind: faithfulness
    secrets: inherit
