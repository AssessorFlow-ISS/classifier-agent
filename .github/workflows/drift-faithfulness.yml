name: Drift — Faithfulness

# DeepEval Faithfulness drift on classifier-agent. Single-row matrix
# (classifier only) — all delegation to scripts/drift_runner.py via
# the shared reusable workflow.

on:
  schedule:
    - cron: '0 11 * * *'   # daily 19:00 SGT (11:00 UTC) — 3-min stagger slot 1/9 (daily for verification, revise to weekly later)
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: drift-faithfulness
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_drift-base.yml
    with:
      drift_kind: faithfulness
    secrets: inherit
