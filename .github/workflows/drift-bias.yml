name: Drift — Bias

# DeepTeam Bias drift on classifier-agent prompts. Smoke sample of 8 payloads.

on:
  schedule:
    - cron: '0 8 * * 1'    # weekly Mon 16:00 SGT (Mon 08:00 UTC) — 5-min stagger slot 3/9
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: drift-bias
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_drift-base.yml
    with:
      drift_kind: bias
    secrets: inherit
