name: Drift — Bias

# DeepTeam Bias drift on classifier-agent prompts. Smoke sample of 8 payloads.

on:
  schedule:
    - cron: '6 11 * * *'   # daily 19:06 SGT (11:06 UTC) — 3-min stagger slot 3/9
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: drift-bias
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_drift-base.yml
    with:
      drift_kind: bias
    secrets: inherit
