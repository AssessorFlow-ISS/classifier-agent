name: Drift — Bias

# DeepTeam Bias drift on classifier-agent prompts. Smoke sample of 8 payloads.

on:
  schedule:
    - cron: '0 23 * * 0'   # weekly Mon 07:00 SGT (Sun 23:00 UTC)
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: drift-bias
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_drift-base.yml
    with:
      drift_kind: bias
    secrets: inherit
