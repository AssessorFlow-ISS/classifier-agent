  v5 (2026-04-23): Split persona/rules/output contract (system_prompt) from
  per-workflow task context (user prompt body). Fixes Gemini
  "contents must not be empty" when only a system message is sent and makes
  the persona visible to the model broker for tool-capable chat semantics.
  v4 (2026-04-23): Unified sufficiency + rubric fitness into one ReAct session.
